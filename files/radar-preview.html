<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; background:#080808; }
canvas { display:block; position:absolute; top:0; left:0; }
</style>
</head>
<body>
<canvas id="canvas-reach"></canvas>
<script>
(function() {
  function initRadar() {
    var canvas = document.getElementById('canvas-reach');
    var dpr = window.devicePixelRatio || 1;
    var W = window.innerWidth;
    var H = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    var CX = W * 0.5, CY = H * 0.5;
    var rings = [W*0.12, W*0.22, W*0.32];
    var t = 0, sweep = 0;

    var dots = [];
    var ringCounts = [5, 8, 11];
    rings.forEach(function(r, ri) {
      for (var i = 0; i < ringCounts[ri]; i++) {
        var angle = (i / ringCounts[ri]) * Math.PI * 2;
        dots.push({
          x: CX + Math.cos(angle) * r,
          y: CY + Math.sin(angle) * r,
          angle: angle, ring: ri,
          lit: false, litT: 0, litAlpha: 0.08,
        });
      }
    });

    var dollars = [];

    function spawnDollar(x, y) {
      var types = ['$', '$', '💰'];
      dollars.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 1.4,
        vy: -0.6 - Math.random() * 0.6,
        alpha: 1,
        size: 9 + Math.random() * 6,
        text: types[Math.floor(Math.random() * types.length)],
        isEmoji: Math.random() > 0.55,
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      t += 0.012;
      sweep = t % (Math.PI * 2);

      var bg = ctx.createRadialGradient(CX, CY, 0, CX, CY, W * 0.38);
      bg.addColorStop(0, 'rgba(255,140,66,0.06)');
      bg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

      rings.forEach(function(r) {
        ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,140,66,0.1)'; ctx.lineWidth = 1; ctx.stroke();
      });

      ctx.strokeStyle = 'rgba(255,140,66,0.05)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(CX, CY - W*0.35); ctx.lineTo(CX, CY + W*0.35); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(CX - W*0.35, CY); ctx.lineTo(CX + W*0.35, CY); ctx.stroke();

      ctx.save();
      ctx.translate(CX, CY);
      ctx.rotate(sweep);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, W * 0.36, -0.55, 0);
      ctx.closePath();
      var swg = ctx.createLinearGradient(0, -W*0.36, W*0.36, 0);
      swg.addColorStop(0, 'rgba(255,140,66,0)');
      swg.addColorStop(1, 'rgba(255,140,66,0.2)');
      ctx.fillStyle = swg; ctx.fill();
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(W * 0.36, 0);
      ctx.strokeStyle = 'rgba(255,140,66,0.7)'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.restore();

      dots.forEach(function(d) {
        var diff = ((sweep - d.angle) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
        if (diff < 0.04 && !d.lit && Math.random() < 0.08) {
          d.lit = true; d.litT = 0;
          spawnDollar(d.x, d.y - 10);
        }
        if (d.lit) { d.litT++; d.litAlpha = Math.min(0.85, d.litAlpha + 0.025); }
        else        { d.litAlpha = Math.max(0.08, d.litAlpha - 0.005); }
        if (d.litT > 180) { d.lit = false; d.litT = 0; }

        if (d.litAlpha > 0.15) {
          var gr = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, 12);
          gr.addColorStop(0, 'rgba(74,222,128,' + (d.litAlpha * 0.5) + ')');
          gr.addColorStop(1, 'rgba(74,222,128,0)');
          ctx.beginPath(); ctx.arc(d.x, d.y, 12, 0, Math.PI*2);
          ctx.fillStyle = gr; ctx.fill();
        }

        var r = d.ring === 0 ? 4.5 : d.ring === 1 ? 3.5 : 3;
        ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, Math.PI*2);
        ctx.fillStyle = d.lit ? 'rgba(74,222,128,' + d.litAlpha + ')' : 'rgba(255,255,255,' + (d.litAlpha * 0.8) + ')';
        ctx.strokeStyle = d.lit ? 'rgba(74,222,128,' + (d.litAlpha * 0.8) + ')' : 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1; ctx.fill(); ctx.stroke();
      });

      var pulse = (Math.sin(t * 3) + 1) / 2;
      var cg = ctx.createRadialGradient(CX, CY, 0, CX, CY, 14 + pulse * 4);
      cg.addColorStop(0, 'rgba(255,140,66,0.5)');
      cg.addColorStop(1, 'rgba(255,140,66,0)');
      ctx.beginPath(); ctx.arc(CX, CY, 14 + pulse * 4, 0, Math.PI*2);
      ctx.fillStyle = cg; ctx.fill();
      ctx.beginPath(); ctx.arc(CX, CY, 7, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,140,66,0.95)'; ctx.fill();
      ctx.textBaseline = 'alphabetic';

      for (var i = dollars.length - 1; i >= 0; i--) {
        var d = dollars[i];
        d.x += d.vx; d.y += d.vy; d.vy += 0.03; d.vx *= 0.98;
        d.alpha -= 0.01;
        if (d.alpha <= 0) { dollars.splice(i, 1); continue; }
        ctx.globalAlpha = d.alpha;
        if (d.isEmoji) {
          ctx.font = d.size + 'px sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(d.text, d.x, d.y);
        } else {
          ctx.shadowColor = 'rgba(74,222,128,0.9)'; ctx.shadowBlur = 8;
          ctx.fillStyle = 'rgba(74,222,128,' + d.alpha + ')';
          ctx.font = 'bold ' + d.size + 'px Poppins,sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('$', d.x, d.y);
          ctx.shadowBlur = 0;
        }
        ctx.globalAlpha = 1; ctx.textBaseline = 'alphabetic';
      }

      requestAnimationFrame(draw);
    }
    draw();
  }
  initRadar();
})();
</script>
</body>
</html>
